<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMBRA</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050505;
color:white;
overflow-x:hidden;
}

/* NAVBAR */

nav{
position:fixed;
top:0;
left:0;
width:100%;
padding:25px 60px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
z-index:1000;
}

.logo{
font-size:28px;
font-weight:900;
letter-spacing:8px;
}

nav ul{
display:flex;
gap:40px;
list-style:none;
}

nav ul li a{
color:white;
text-decoration:none;
font-size:13px;
letter-spacing:3px;
transition:0.3s;
}

nav ul li a:hover{
opacity:0.5;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero img{
width:260px;
margin-bottom:30px;
}

.hero h1{
font-size:120px;
font-weight:900;
letter-spacing:18px;
}

.hero p{
margin-top:10px;
font-size:18px;
letter-spacing:6px;
opacity:0.7;
}

.hero button{
margin-top:40px;
padding:18px 50px;
background:white;
color:black;
border:none;
font-weight:bold;
letter-spacing:3px;
cursor:pointer;
transition:0.3s;
}

.hero button:hover{
transform:scale(1.05);
}

/* SECTION */

.section-title{
padding:80px 60px 30px;
font-size:50px;
font-weight:900;
letter-spacing:5px;
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:30px;
padding:0 60px 100px;
}

.card{
background:#111;
overflow:hidden;
position:relative;
transition:0.4s;
}

.card:hover{
transform:translateY(-10px);
}

.card img{
width:100%;
height:500px;
object-fit:cover;
transition:0.4s;
}

.card:hover img{
transform:scale(1.05);
}

.coming{
position:absolute;
top:20px;
right:20px;
background:black;
padding:10px 18px;
border-radius:8px;
font-size:12px;
letter-spacing:2px;
}

.info{
padding:25px;
}

.info h3{
font-size:24px;
margin-bottom:10px;
}

.info p{
opacity:0.5;
letter-spacing:3px;
}

/* FOOTER */

footer{
padding:40px;
text-align:center;
border-top:1px solid rgba(255,255,255,0.1);
opacity:0.5;
}

/* MOBILE */

@media(max-width:768px){

.hero h1{
font-size:70px;
}

.hero img{
width:180px;
}

nav{
padding:20px;
}

nav ul{
gap:15px;
}

.section-title{
padding:60px 20px 20px;
font-size:35px;
}

.products{
padding:0 20px 80px;
}

}

</style>
</head>

<body>

<nav>

<div class="logo">OMBRA</div>

<ul>
<li><a href="#">HOME</a></li>
<li><a href="#">SHOP</a></li>
<li><a href="#">ABOUT</a></li>
<li><a href="#">CONTACT</a></li>
</ul>

</nav>

<section class="hero">

<img src="ombra/logo.png" alt="OMBRA Logo">

<h1>OMBRA</h1>

<p>DARK LUXURY STREETWEAR</p>

<button>SHOP NOW</button>

</section>

<h2 class="section-title">NEW DROP</h2>

<section class="products">

<div class="card">

<div class="coming">COMING SOON</div>

<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?q=80&w=1200&auto=format&fit=crop" alt="hoodie">

<div class="info">
<h3>SHADOW HOODIE</h3>
<p>LIMITED COLLECTION</p>
</div>

</div>

<div class="card">

<div class="coming">COMING SOON</div>

<img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?q=80&w=1200&auto=format&fit=crop" alt="pants">

<div class="info">
<h3>DARK PANTS</h3>
<p>2026 SEASON</p>
</div>

</div>

</section>

<footer>
OMBRA © 2026
</footer>

</body>
</html>
