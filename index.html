<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OMBRA</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:black;
      color:white;
      overflow-x:hidden;
    }

    .hero{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      text-align:center;
    }

    h1{
      font-size:90px;
      letter-spacing:10px;
    }

    p{
      margin-top:20px;
      color:gray;
      font-size:18px;
    }

    .btn{
      margin-top:40px;
      padding:15px 40px;
      border:1px solid white;
      color:white;
      text-decoration:none;
      transition:0.3s;
    }

    .btn:hover{
      background:white;
      color:black;
    }
  </style>
</head>

<body>

  <section class="hero">
    <h1>OMBRA</h1>
    <p>Dark Streetwear Vision</p>

    <a href="https://instagram.com" class="btn">
      INSTAGRAM
    </a>
  </section>

</body>
</html>
